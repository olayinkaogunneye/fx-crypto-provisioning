version: 2

models:
  - name: silver_crypto_prices
    description: >
      Cleaned and deduplicated crypto price data sourced from bronze_crypto_prices_raw.
      Ensures one record per date and symbol, keeping the latest ingestion_timestamp.
    columns:
      - name: date
        description: "Date of the crypto price observation."
        tests:
          - not_null

      - name: price
        description: "Cleaned crypto price (must be > 0)."
        tests:
          - not_null

      - name: symbol
        description: "Uppercased crypto asset symbol."
        tests:
          - not_null

      - name: source
        description: "Data source identifier."

      - name: ingestion_timestamp
        description: "Timestamp of ingestion; used for deduplication."

  - name: silver_fx_rates
    description: >
      Cleaned and deduplicated FX rate data sourced from bronze_fx_rates_raw.
      Ensures one record per date and currency_pair, keeping the latest ingestion_timestamp.
    columns:
      - name: date
        description: "Date of the FX rate observation."
        tests:
          - not_null

      - name: rate
        description: "Cleaned FX rate (non-null)."
        tests:
          - not_null

      - name: currency_pair
        description: "Uppercased FX currency pair (e.g., GBPUSD)."
        tests:
          - not_null

      - name: source
        description: "Data source identifier."

      - name: ingestion_timestamp
        description: "Timestamp of ingestion; used for deduplication."

      - name: source_file_name
        description: "Original file name from ingestion pipeline."